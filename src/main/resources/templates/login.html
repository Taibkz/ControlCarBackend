<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Login - ControlCar</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="card auth-box">
            <h2 style="text-align: center; color: var(--primary-color);">ControlCar</h2>
            <form th:action="@{/login}" method="post">
                <div>
                    <label>Usuario</label>
                    <input type="text" name="username" required>
                </div>
                <div>
                    <label>Contraseña</label>
                    <input type="password" name="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Ingresar</button>
            </form>
            <div th:if="${param.error}" style="color: red; margin-top: 10px; text-align: center;">
                Usuario o contraseña incorrectos
            </div>
            <div th:if="${param.logout}" style="color: var(--secondary-color); margin-top: 10px; text-align: center;">
                Has cerrado sesión correctamente
            </div>
        </div>
    </div>

    <style>
        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</body>

</html>
