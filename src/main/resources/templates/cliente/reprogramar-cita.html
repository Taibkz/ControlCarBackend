<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reprogramar Cita - ControlCar</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
</head>

<body>
    <nav class="navbar">
        <div class="brand">ControlCar <span
                style="font-size: 0.6em; color: var(--text-muted); text-transform: uppercase;">| Reprogramar</span>
        </div>
        <div class="nav-links">
            <a th:href="@{/cliente/panel}">Volver al Panel</a>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: 2rem auto;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div
                    style="background: rgba(var(--primary-rgb), 0.1); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                    <i class="fas fa-calendar-alt" style="color: var(--primary-color); font-size: 1.5rem;"></i>
                </div>
                <h2>Reprogramar Cita</h2>
                <p style="color: var(--text-muted);">Selecciona una nueva fecha para tu servicio.</p>
            </div>

            <div style="background: rgba(255,255,255,0.03); padding: 1.5rem; border-radius: 10px; margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <span style="color: var(--text-muted);">Vehículo:</span>
                    <strong th:text="${cita.vehiculo?.modelo}">Vehículo</strong>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: var(--text-muted);">Servicio actual:</span>
                    <strong th:text="${cita.servicio?.nombre}">Servicio</strong>
                </div>
            </div>

            <div th:if="${error}" class="alert alert-danger" style="margin-bottom: 1.5rem;">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/cliente/citas/{id}/reprogramar(id=${cita.id})}" method="post">
                <div class="form-group">
                    <label>Nueva Fecha y Hora</label>
                    <div style="position: relative;">
                        <i class="fas fa-calendar"
                            style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); z-index: 1;"></i>
                        <input type="text" id="fechaHora" name="fechaHora" class="form-control"
                            placeholder="Selecciona nueva fecha" style="padding-left: 40px;" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Confirmar Cambio
                </button>
            </form>
        </div>
    </div>

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function () {
            // Horario comercial
            // L-J: 09:00-14:30, 16:00-20:00
            // V-S: 11:00-15:00
            // D: Cerrado

            flatpickr("#fechaHora", {
                enableTime: true,
                dateFormat: "Y-m-d\\TH:i",
                altInput: true,
                altFormat: "d F Y, H:i",
                minDate: "today",
                locale: "es",
                time_24hr: true,
                disable: [
                    function (date) {
                        return (date.getDay() === 0); // Deshabilitar domingos
                    }
                ],
                onChange: function (selectedDates, dateStr, instance) {
                    if (selectedDates.length === 0) return;

                    const date = selectedDates[0];
                    const day = date.getDay();
                    const hour = date.getHours();
                    const minutes = date.getMinutes();
                    const time = hour + (minutes / 60);

                    let isValid = false;

                    if (day >= 1 && day <= 4) { // Lunes a Jueves
                        // 09:00 - 14:30 (14.5) Y 16:00 - 20:00
                        if ((time >= 9 && time <= 14.5) || (time >= 16 && time <= 20)) {
                            isValid = true;
                        }
                    } else if (day === 5 || day === 6) { // Viernes y Sábado
                        // 11:00 - 15:00
                        if (time >= 11 && time <= 15) {
                            isValid = true;
                        }
                    }

                    if (!isValid) {
                        instance.clear();
                        alert("Por favor selecciona un horario dentro de la apertura:\nL-J: 09:00-14:30, 16:00-20:00\nV-S: 11:00-15:00");
                    }
                }
            });
        });
    </script>
</body>

</html>
