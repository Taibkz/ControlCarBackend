<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Nuevo Cliente - ControlCar</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <nav class="navbar">
        <div class="brand">ControlCar</div>
        <div class="nav-links">
            <a th:href="@{/admin/clientes}">Volver</a>
        </div>
    </nav>

    <div class="container">
        <h1>Registrar Nuevo Cliente</h1>
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <form th:action="@{/admin/clientes/guardar}" th:object="${cliente}" method="post">
                <div>
                    <label>Nombre Completo</label>
                    <input type="text" th:field="*{nombreCompleto}" required>
                </div>
                <div>
                    <label>Nombre de Usuario</label>
                    <input type="text" th:field="*{username}" required>
                </div>
                <div>
                    <label>Email</label>
                    <input type="email" th:field="*{email}">
                </div>
                <div>
                    <label>Contraseña</label>
                    <input type="password" th:field="*{password}" required>
                </div>
                <button type="submit" class="btn">Guardar Cliente</button>
            </form>
        </div>
    </div>
</body>

</html>
