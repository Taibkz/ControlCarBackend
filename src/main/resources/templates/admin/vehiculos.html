<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Vehículos - ControlCar</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <nav class="navbar">
        <div class="brand">ControlCar <span style="font-size: 0.8em; color: var(--text-muted);">| Admin</span></div>
        <div class="nav-links">
            <a th:href="@{/admin/panel}">Inicio</a>
            <a th:href="@{/admin/clientes}">Clientes</a>
            <a th:href="@{/admin/vehiculos}" style="color: var(--secondary-color);">Vehículos</a>
            <a th:href="@{/admin/servicios}">Servicios</a>
            <a th:href="@{/admin/citas}">Citas</a>
            <a th:href="@{/logout}">Salir</a>
        </div>
    </nav>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Gestión de Vehículos</h1>
            <a th:href="@{/admin/vehiculos/nuevo}" class="btn">Nuevo Vehículo</a>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Año</th>
                        <th>Propietario</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="vehiculo : ${vehiculos}">
                        <td th:text="${vehiculo.matricula}"></td>
                        <td th:text="${vehiculo.marca}"></td>
                        <td th:text="${vehiculo.modelo}"></td>
                        <td th:text="${vehiculo.anio}"></td>
                        <td
                            th:text="${vehiculo.propietario != null ? vehiculo.propietario.nombreCompleto : 'Sin propietario'}">
                        </td>
                        <td>
                            <a th:href="@{/admin/vehiculos/eliminar/{id}(id=${vehiculo.id})}"
                                style="color: var(--primary-color);">Eliminar</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
