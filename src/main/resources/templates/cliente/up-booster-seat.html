<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Reprogramar Cita - ControlCar</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
</head>

<body>
    <nav class="navbar">
        <div class="brand">ControlCar <span
                style="font-size: 0.6em; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">|
                Premium</span></div>
        <div class="nav-links">
            <a th:href="@{/cliente/panel}"><i class="fas fa-arrow-left"></i> Volver</a>
        </div>
    </nav>

    <div class="container" style="max-width: 800px; padding-top: 4rem;">
        <div class="glass-panel" style="padding: 3rem; position: relative; overflow: hidden;">
            <div
                style="position: absolute; top: -50px; right: -50px; width: 150px; height: 150px; background: var(--primary-color); opacity: 0.05; border-radius: 50%;">
            </div>

            <header style="margin-bottom: 2.5rem; text-align: center;">
                <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Reprogramar Cita</h1>
                <p style="color: var(--text-muted);">Selecciona una nueva fecha y hora para tu servicio.</p>
            </header>

            <div th:if="${error}" class="alert"
                style="background: rgba(229, 9, 20, 0.1); border-left: 4px solid var(--primary-color); color: var(--primary-color); padding: 1rem; margin-bottom: 2rem; border-radius: 4px;">
                <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
            </div>

            <div
                style="margin-bottom: 2rem; padding: 1.5rem; background: rgba(255,255,255,0.02); border-radius: 12px; border: 1px solid var(--glass-border);">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <label style="font-size: 0.7rem; color: var(--secondary-color);">Vehículo</label>
                        <p style="font-size: 1.1rem; font-weight: 600;"
                            th:text="${cita.vehiculo.marca} + ' ' + ${cita.vehiculo.modelo}"></p>
                    </div>
                    <div>
                        <label style="font-size: 0.7rem; color: var(--secondary-color);">Servicio</label>
                        <p style="font-size: 1.1rem; font-weight: 600;" th:text="${cita.servicio.nombre}"></p>
                    </div>
                </div>
            </div>

            <form th:action="@{/cliente/citas/{id}/reprogramar(id=${cita.id})}" method="post">
                <div class="form-group">
                    <label><i class="fas fa-calendar-alt"></i> Nueva Fecha y Hora</label>
                    <div style="position: relative;">
                        <input type="text" name="fechaHora" id="fechaHora"
                            th:value="${#temporals.format(cita.fechaHora, 'yyyy-MM-dd''T''HH:mm')}"
                            placeholder="Selecciona nueva fecha..." required style="padding-left: 45px;">
                        <i class="far fa-clock"
                            style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary-color);"></i>
                    </div>
                    <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 10px;">
                        <i class="fas fa-info-circle"></i> La disponibilidad se validará al confirmar.
                    </p>
                </div>

                <div
                    style="margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 2rem; text-align: center;">
                    <button type="submit" class="btn" style="width: 100%; max-width: 400px;">
                        <i class="fas fa-sync-alt"></i> Confirmar Cambio
                    </button>
                    <div
                        style="margin-top: 15px; display: flex; justify-content: center; gap: 20px; font-size: 0.8rem; color: var(--text-muted);">
                        <span><i class="fas fa-clock"></i> L-J: 9:00-20:00*</span>
                        <span><i class="fas fa-clock"></i> V-S: 11:00-15:00</span>
                    </div>
                </div>
            </form>
        </div>

        <div style="text-align: center; margin-top: 3rem; color: var(--text-muted); font-size: 0.85rem;">
            * El taller cierra de 14:30 a 16:00 de Lunes a Jueves para mantenimiento interno.
        </div>
    </div>

    <!-- Flatpickr JS -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            flatpickr("#fechaHora", {
                enableTime: true,
                dateFormat: "Y-m-d\\TH:i",
                altInput: true,
                altFormat: "j \\de F, Y - H:i",
                locale: "es",
                minDate: "today",
                time_24hr: true,
                defaultDate: document.getElementById('fechaHora').value,
                disable: [
                    function (date) {
                        return (date.getDay() === 0);
                    }
                ],
                onChange: function (selectedDates, dateStr, instance) {
                    const date = selectedDates[0];
                    if (!date) return;

                    const day = date.getDay();
                    const hour = date.getHours();
                    const mins = date.getMinutes();
                    const time = hour + (mins / 60);

                    let isValid = true;
                    if (day >= 1 && day <= 4) { // L-J
                        const isMorning = time >= 9 && time <= 14.5;
                        const isEvening = time >= 16 && time <= 20;
                        if (!isMorning && !isEvening) {
                            isValid = false;
                        }
                    } else if (day === 5 || day === 6) { // V-S
                        if (time < 11 || time > 15) {
                            isValid = false;
                        }
                    }

                    if (!isValid) {
                        alert("El horario seleccionado está fuera de las horas de apertura del taller.");
                        instance.clear();
                    }
                }
            });
        });
    </script>
</body>

</html>
