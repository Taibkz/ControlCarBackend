<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Nuevo Servicio - ControlCar</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <nav class="navbar">
        <div class="brand">ControlCar</div>
        <div class="nav-links">
            <a th:href="@{/admin/servicios}">Volver</a>
        </div>
    </nav>

    <div class="container">
        <h1>Crear Nuevo Servicio</h1>
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <form th:action="@{/admin/servicios/guardar}" th:object="${servicio}" method="post">
                <div>
                    <label>Nombre del Servicio</label>
                    <input type="text" th:field="*{nombre}" required>
                </div>
                <div>
                    <label>Descripción</label>
                    <input type="text" th:field="*{descripcion}">
                </div>
                <div>
                    <label>Precio (€)</label>
                    <input type="number" step="0.01" th:field="*{precio}" required>
                </div>
                <button type="submit" class="btn">Guardar Servicio</button>
            </form>
        </div>
    </div>
</body>

</html>
