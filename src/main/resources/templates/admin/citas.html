<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Citas - ControlCar</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <nav class="navbar">
        <div class="brand">ControlCar <span style="font-size: 0.8em; color: var(--text-muted);">| Admin</span></div>
        <div class="nav-links">
            <a th:href="@{/admin/panel}">Inicio</a>
            <a th:href="@{/admin/clientes}">Clientes</a>
            <a th:href="@{/admin/vehiculos}">Vehículos</a>
            <a th:href="@{/admin/servicios}">Servicios</a>
            <a th:href="@{/admin/citas}" style="color: var(--secondary-color);">Citas</a>
            <a th:href="@{/logout}">Salir</a>
        </div>
    </nav>

    <div class="container">
        <h1>Gestión de Citas</h1>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Vehículo</th>
                        <th>Servicio</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cita : ${citas}">
                        <td th:text="${#temporals.format(cita.fechaHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <td th:text="${cita.cliente.nombreCompleto}"></td>
                        <td th:text="${cita.vehiculo.modelo} + ' (' + ${cita.vehiculo.matricula} + ')'"></td>
                        <td th:text="${cita.servicio.nombre}"></td>
                        <td>
                            <span th:class="'badge ' + ${cita.estado}" th:text="${cita.estado}"></span>
                        </td>
                        <td>
                            <div style="display: flex; gap: 8px;">
                                <a th:href="@{/admin/citas/editar/{id}(id=${cita.id})}" class="btn-small"
                                    style="background-color: var(--secondary-color); color: #000; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 0.8rem;">
                                    <i class="fas fa-edit"></i>
                                </a>
                                <form th:action="@{/admin/citas/eliminar/{id}(id=${cita.id})}" method="post"
                                    onsubmit="return confirm('¿Estás seguro de que deseas eliminar esta cita?');"
                                    style="display: inline;">
                                    <button type="submit" class="btn-small"
                                        style="background-color: var(--primary-color); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem;">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
